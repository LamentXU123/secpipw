name: Benchmark

permissions:
  actions: read
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/benchmark.yml"
      - "scripts/benchmark_install.py"
      - "scripts/benchmark_package_managers.py"
      - "scripts/benchmark_viztracer.py"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - "README.zh-CN.md"
      - "doc/**"
  workflow_dispatch:
    inputs:
      runs:
        description: Measured runs per tool
        required: false
        default: "20"
      warmups:
        description: Warmup runs per tool
        required: false
        default: "1"
      requirements:
        description: Requirements to benchmark, one per line
        required: false
        default: |
          opencv-python
          scipy
          requests
  schedule:
    - cron: "17 2 * * 1"

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Resolve benchmark job URL
        env:
          GH_API_URL: ${{ github.api_url }}
          GH_JOB_NAME: ${{ github.job }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ.get("GH_API_URL", "https://api.github.com").rstrip("/")
          job_name = os.environ.get("GH_JOB_NAME", "")
          repository = os.environ["GH_REPOSITORY"]
          run_attempt = os.environ.get("GH_RUN_ATTEMPT", "")
          run_id = os.environ["GH_RUN_ID"]
          server_url = os.environ.get("GH_SERVER_URL", "https://github.com").rstrip("/")
          token = os.environ.get("GH_TOKEN", "")
          run_url = f"{server_url}/{repository}/actions/runs/{run_id}"
          job_url = run_url

          headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          endpoints = []
          if run_attempt:
              endpoints.append(
                  f"{api_url}/repos/{repository}/actions/runs/{run_id}/attempts/{run_attempt}/jobs?per_page=100"
              )
          endpoints.append(
              f"{api_url}/repos/{repository}/actions/runs/{run_id}/jobs?per_page=100"
          )

          for endpoint in endpoints:
              try:
                  request = urllib.request.Request(endpoint, headers=headers)
                  with urllib.request.urlopen(request, timeout=20) as response:
                      jobs = json.loads(response.read().decode("utf-8")).get("jobs", [])
              except Exception as exc:
                  print(f"could not resolve benchmark job URL from {endpoint}: {exc}")
                  continue

              selected = next((job for job in jobs if job.get("name") == job_name), None)
              if selected is None and len(jobs) == 1:
                  selected = jobs[0]
              if selected and selected.get("html_url"):
                  job_url = selected["html_url"]
                  break

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"BENCHMARK_RUN_URL={run_url}\n")
              env_file.write(f"BENCHMARK_JOB_URL={job_url}\n")
          print(f"benchmark run URL: {run_url}")
          print(f"benchmark job URL: {job_url}")
          PY

      - name: Run install benchmark
        env:
          BENCHMARK_RUNS: ${{ github.event.inputs.runs || '20' }}
          BENCHMARK_WARMUPS: ${{ github.event.inputs.warmups || '1' }}
          BENCHMARK_REQUIREMENTS: ${{ github.event.inputs.requirements }}
        run: |
          if [ -z "$BENCHMARK_REQUIREMENTS" ]; then
            BENCHMARK_REQUIREMENTS="$(printf 'opencv-python\nscipy\nrequests\n')"
          fi
          args=()
          while IFS= read -r requirement; do
            if [ -n "$requirement" ]; then
              args+=(--requirement "$requirement")
            fi
          done <<< "$BENCHMARK_REQUIREMENTS"
          python scripts/benchmark_install.py \
            --runs "$BENCHMARK_RUNS" \
            --warmups "$BENCHMARK_WARMUPS" \
            "${args[@]}" \
            --json benchmark-results.json

      - name: Upload install benchmark
        uses: actions/upload-artifact@v4
        with:
          name: install-benchmark-results
          path: benchmark-results.json

