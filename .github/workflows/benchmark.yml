  publish-benchmark:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - install-benchmark
      - manager-benchmark-pip
      - manager-benchmark-uv
      - manager-benchmark-pipx
      - manager-benchmark-poetry
    steps:
      - uses: actions/checkout@v4

      - name: Download install benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: install-benchmark-results
          path: .benchmark-artifacts/install

      - name: Download manager benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: manager-benchmark-*
          merge-multiple: true
          path: .benchmark-artifacts/manager

      - name: Merge manager benchmark data
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_JOB_NAME: ${{ github.job }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(".benchmark-artifacts/manager")
          payloads = []
          for path in sorted(root.glob("*.json")):
              payloads.append(json.loads(path.read_text(encoding="utf-8")))

          if not payloads:
              raise SystemExit("no manager benchmark artifacts found")

          summary_rows = []
          records = []
          runs = None
          for payload in payloads:
              if runs is None:
                  runs = payload.get("runs")
              summary_rows.extend(payload.get("summaries", []))
              records.extend(payload.get("records", []))

          merged = {
              "generated_at": payloads[0].get("generated_at"),
              "runs": runs,
              "mode": "guarded package-manager wall-clock benchmark",
              "summaries": summary_rows,
              "records": records,
              "source": {
                  "repository": os.environ.get("GH_REPOSITORY"),
                  "run_id": os.environ.get("GH_RUN_ID"),
                  "job_name": os.environ.get("GH_JOB_NAME"),
                  "run_url": f"{os.environ.get('GH_SERVER_URL', 'https://github.com').rstrip('/')}/{os.environ.get('GH_REPOSITORY')}/actions/runs/{os.environ.get('GH_RUN_ID')}",
              },
          }
          merged["benchmark_url"] = merged["source"]["run_url"]
          Path("manager-benchmark-results.json").write_text(
              json.dumps(merged, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY

      - name: Publish website benchmark data
        env:
          DATA_BRANCH: benchmark-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf .benchmark-data
          if git ls-remote --exit-code --heads origin "$DATA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$DATA_BRANCH"
            git worktree add .benchmark-data "origin/$DATA_BRANCH"
          else
            git worktree add --detach .benchmark-data HEAD
            git -C .benchmark-data checkout --orphan "$DATA_BRANCH"
            git -C .benchmark-data rm -rf .
          fi
          cp .benchmark-artifacts/install/benchmark-results.json .benchmark-data/benchmark.json
          cp manager-benchmark-results.json .benchmark-data/manager-benchmark.json
          cat > .benchmark-data/vercel.json <<'JSON'
          {
            "ignoreCommand": "exit 0"
          }
          JSON
          git -C .benchmark-data add -f benchmark.json manager-benchmark.json vercel.json
          if git -C .benchmark-data diff --cached --quiet; then
            echo "benchmark data unchanged"
          else
            git -C .benchmark-data commit -m "Update benchmark data"
            git -C .benchmark-data push origin HEAD:"$DATA_BRANCH"
          fi
