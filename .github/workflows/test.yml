name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        pip-version: ['stable', 'latest']
        exclude:
          - python-version: '3.10'
            pip-version: 'latest'
          - python-version: '3.11'
            pip-version: 'latest'
          - python-version: '3.13'
            pip-version: 'latest'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    
    - name: Install dependencies
      run: |
        if [ "${{ matrix.pip-version }}" = "latest" ]; then
          python -m pip install --upgrade pip
        else
          python -m pip install "pip<26"
        fi

    - name: Install package
      run: python -m pip install -e .

    - name: Run tests
      run: |
        pip install coverage
        coverage run --source ./src/secpipw -m unittest discover -s . -p "test*.py" -v
        coverage xml -i
    - name: Smoke test guarded install
      run: |
        spip install --dry-run --no-deps packaging==24.2 --spip-ignore-warning
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
